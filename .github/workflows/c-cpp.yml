name: C/C++ CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

# https://github.com/git-lfs/git-lfs/issues/5749
env:
  GIT_CLONE_PROTECTION_ACTIVE: false
  GIT_LFS_SKIP_SMUDGE: true
  LVK_WITH_SLANG: "OFF"

jobs:
  build:
    name: "Android (Ubuntu)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Cache third-party deps
        uses: actions/cache@v5
        with:
          path: third-party/deps
          key: deps-${{ runner.os }}-${{ hashFiles('third-party/bootstrap-deps.json') }}

      - name: Set up NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1.6.0
        with:
          ndk-version: r29
          local-cache: true

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: 19
          distribution: 'oracle'
          cache: 'gradle'

      - name: Install Ubuntu packages
        shell: bash
        run: |
            sudo apt-get update
            sudo apt-get install -y gcc-14 clang-18 xorg-dev libxinerama-dev libxcursor-dev libgles2-mesa-dev libegl1-mesa-dev libglfw3-dev libglew-dev libstdc++-14-dev extra-cmake-modules libxkbcommon-x11-dev wayland-protocols ninja-build
            sudo apt remove cmake -y
            sudo pip install --break-system-packages cmake==4.0.0
            which make
            cmake --version

#      - name: Prepare Vulkan SDK
#        uses: jakoch/install-vulkan-sdk-action@v1.5.2
#        with:
#            vulkan_version: 1.4.341.0
#            install_runtime: true
#            cache: true
#            stripdown: true

      - name: Generate Android projects
        shell: bash
        env:
          CC: "clang-18"
          CXX: "clang++-18"
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          cmake -G Ninja -S "${{ github.workspace }}" -B build -DLVK_WITH_SAMPLES_ANDROID=ON -DLVK_DEPLOY_SCREENSHOT_TESTS=OFF

      - name: Assemble APKs
        run: |
          samples=(
            009_TriplanarMapping
            Tiny_MeshLarge
            003_RenderToCubeMapSinglePass
          )
          for dir in "${samples[@]}"; do
            cd build/android/$dir
            chmod +x ./gradlew
            ./gradlew assembleDebug
            cd ${{ github.workspace }}
          done

  cmake-build:
      strategy:
        fail-fast: false
        matrix:
          config:
          - {
              name: "Windows - MSVC 2022 (glslang, GLFW)",
              os: windows-latest,
              build_type: "Debug",
              cc: "cl",
              cxx: "cl",
              generators: "Visual Studio 17 2022",
              cmake_args: "-DLVK_WITH_TRACY=ON -DLVK_WITH_TRACY_GPU=ON -DLVK_WITH_GLFW=ON -DLVK_DEPLOY_SCREENSHOT_TESTS=OFF"
            }
          - {
              name: "Windows - MSVC 2022 (glslang, SDL3)",
              os: windows-latest,
              build_type: "Debug",
              cc: "cl",
              cxx: "cl",
              generators: "Visual Studio 17 2022",
              cmake_args: "-DLVK_WITH_TRACY=ON -DLVK_WITH_TRACY_GPU=ON -DLVK_WITH_GLFW=OFF -DLVK_WITH_SDL3=ON -DLVK_DEPLOY_SCREENSHOT_TESTS=OFF"
            }
          - {
              name: "Windows - MSVC 2026 (glslang, GLFW)",
              os: windows-2025-vs2026,
              build_type: "Debug",
              cc: "cl",
              cxx: "cl",
              generators: "Visual Studio 18 2026",
              cmake_args: "-DLVK_WITH_TRACY=ON -DLVK_WITH_TRACY_GPU=ON -DLVK_WITH_GLFW=ON -DLVK_DEPLOY_SCREENSHOT_TESTS=OFF"
            }
#          - {
#              name: "Windows - MSVC 2022 (Slang)",
#              os: windows-latest,
#              build_type: "Debug",
#              cc: "cl",
#              cxx: "cl",
#              generators: "Visual Studio 17 2022",
#              cmake_args: "-DLVK_WITH_TRACY=ON -DLVK_WITH_SLANG=ON"
#            }
          - {
              name: "Ubuntu - Clang (GLFW)",
              os: ubuntu-latest,
              build_type: "Debug",
              cc: "clang-18",
              cxx: "clang++-18",
              generators: "Unix Makefiles",
              cmake_args: "-DLVK_WITH_GLFW=ON -DLVK_WITH_SDL3=OFF -DLVK_DEPLOY_SCREENSHOT_TESTS=OFF -DLVK_WITH_SPIRV_OPT=ON"
            }
          - {
              name: "Ubuntu - Clang (SDL3)",
              os: ubuntu-latest,
              build_type: "Debug",
              cc: "clang-18",
              cxx: "clang++-18",
              generators: "Unix Makefiles",
              cmake_args: "-DLVK_WITH_GLFW=OFF -DLVK_WITH_SDL3=ON -DLVK_DEPLOY_SCREENSHOT_TESTS=OFF -DLVK_WITH_SPIRV_OPT=ON"
            }
          - {
              name: "Ubuntu - Clang (Wayland)",
              os: ubuntu-latest,
              build_type: "Debug",
              cc: "clang-18",
              cxx: "clang++-18",
              generators: "Unix Makefiles",
              cmake_args: "-DLVK_WITH_WAYLAND=ON -DLVK_DEPLOY_SCREENSHOT_TESTS=OFF"
            }
#          - {
#              name: "Ubuntu - GCC",
#              os: ubuntu-latest,
#              build_type: "Debug",
#              cc: "gcc-14",
#              cxx: "g++-14",
#              generators: "Unix Makefiles"
#            }
      runs-on: ${{ matrix.config.os }}

      steps:
        - uses: actions/checkout@v6
          with:
            submodules: recursive

        - name: Cache third-party deps
          uses: actions/cache@v5
          with:
            path: third-party/deps
            key: deps-${{ runner.os }}-${{ hashFiles('third-party/bootstrap-deps.json') }}

        - if: startsWith(matrix.config.os, 'ubuntu')
          name: Install Ubuntu packages
          run: |
            sudo apt-get update
            sudo apt-get install -y gcc-14 clang-18 xorg-dev libxinerama-dev libxcursor-dev libgles2-mesa-dev libegl1-mesa-dev libglfw3-dev libglew-dev libstdc++-14-dev extra-cmake-modules libxkbcommon-x11-dev wayland-protocols
            sudo apt remove cmake -y
            sudo pip install --break-system-packages cmake==4.0.0

        - name: Prepare Vulkan SDK
          uses: jakoch/install-vulkan-sdk-action@v1.5.2
          with:
            vulkan_version: 1.4.341.0
            install_runtime: true
            cache: true
            stripdown: true

        - name: Get the number of CPU cores
          id: cpu-cores
          uses: SimenB/github-actions-cpu-cores@v3

        - name: Build
          shell: bash
          env:
            CC:  ${{ matrix.config.cc }}
            CXX: ${{ matrix.config.cxx }}
          run: |
            cmake ${{ env.CMAKE_GENERATOR }} -S "${{ github.workspace }}" -B build ${{ matrix.config.cmake_args }}
            cd build
            cmake --build . --parallel ${{ steps.cpu-cores.outputs.count }}
  
  cmake-build-macos:
      strategy:
        fail-fast: false
        matrix:
          config:
          - {
              name: "macOS - Clang (Xcode)",
              os: macos-latest,
              build_type: "Debug",
              cc: "clang",
              cxx: "clang++",
              generators: "Xcode",
              cmake_args: "-DLVK_WITH_TRACY=OFF -DLVK_DEPLOY_SCREENSHOT_TESTS=OFF"
            }
      runs-on: ${{ matrix.config.os }}

      steps:
        - uses: actions/checkout@v6
          with:
            submodules: recursive

        - name: Cache third-party deps
          uses: actions/cache@v5
          with:
            path: third-party/deps
            key: deps-${{ runner.os }}-${{ hashFiles('third-party/bootstrap-deps.json') }}

        - name: Install Vulkan SDK
          uses: jakoch/install-vulkan-sdk-action@v1.5.2
          with:
            vulkan_version: 1.4.341.0
            install_runtime: true
            cache: true
            stripdown: true

        - name: Get the number of CPU cores
          id: cpu-cores
          uses: SimenB/github-actions-cpu-cores@v3

        - name: Build
          shell: bash
          env:
            CC:  ${{ matrix.config.cc }}
            CXX: ${{ matrix.config.cxx }}
          run: |
            cmake ${{ env.CMAKE_GENERATOR }} -S "${{ github.workspace }}" -B build ${{ matrix.config.cmake_args }}
            cd build
            cmake --build . --parallel ${{ steps.cpu-cores.outputs.count }}

  cmake-test-ubuntu:
      strategy:
        fail-fast: false
        matrix:
          config:
          - {
              name: "Ubuntu - Clang",
              os: ubuntu-latest,
              build_type: "Debug",
              cc: "clang-18",
              cxx: "clang++-18",
              generators: "Unix Makefiles",
            }
      runs-on: ${{ matrix.config.os }}

      steps:
        - uses: actions/checkout@v6
          with:
            submodules: recursive

        - name: Cache third-party deps
          uses: actions/cache@v5
          with:
            path: third-party/deps
            key: deps-${{ runner.os }}-${{ hashFiles('third-party/bootstrap-deps.json') }}

        - name: Install Ubuntu packages
          shell: bash
          run: |
            sudo apt-get update
            sudo apt-get install -y gcc-14 clang-18 xorg-dev libxinerama-dev libxcursor-dev libgles2-mesa-dev libegl1-mesa-dev libglfw3-dev libglew-dev libstdc++-14-dev extra-cmake-modules libxkbcommon-x11-dev wayland-protocols ninja-build
            sudo apt-get install -y mesa-vulkan-drivers libvulkan1 vulkan-tools vulkan-validationlayers
            sudo apt remove cmake -y
            sudo pip install --break-system-packages cmake==4.0.0
            which make
            cmake --version
            vulkaninfo

        - name: Install Vulkan SDK
          uses: jakoch/install-vulkan-sdk-action@v1.5.2
          with:
            vulkan_version: 1.4.341.0
            install_runtime: true
            cache: false
            stripdown: true

        - name: Get the number of CPU cores
          id: cpu-cores
          uses: SimenB/github-actions-cpu-cores@v3

        - name: Build
          shell: bash
          env:
            CC:  ${{ matrix.config.cc }}
            CXX: ${{ matrix.config.cxx }}
          run: |
            cmake ${{ env.CMAKE_GENERATOR }} -S "${{ github.workspace }}" -B build ${{ matrix.config.cmake_args }} -DCMAKE_BUILD_TYPE=Debug -DLVK_DEPLOY_SCREENSHOT_TESTS=ON
            cd build
            cmake --build . --parallel ${{ steps.cpu-cores.outputs.count }}

        # ktx-software tracks tests/srcimages/**/*.{jpg,png} via git-LFS, and the workflow-level
        # GIT_LFS_SKIP_SMUDGE=true leaves them as pointer stubs after `bootstrap.py` clones the repo.
        # 007_DynamicRenderingLocalRead loads the Iron_Bars PBR set from there — materialize it explicitly.
        - name: Fetch Iron_Bars textures (git-LFS)
          shell: bash
          env:
            GIT_LFS_SKIP_SMUDGE: 0
          run: |
            cd third-party/deps/src/ktx-software
            git lfs install --local
            git lfs pull --include="tests/srcimages/Iron_Bars/**"

        - name: Run tests
          run: |
            mkdir -p screenshots
            ls build/samples
            ARGS="--headless --width 1280 --height 720"
            ./build/samples/001_HelloTriangle                $ARGS --screenshot-frame 1    --screenshot-file screenshots/001_HelloTriangle.png               --log-file 001_HelloTriangle.txt
            ./build/samples/002_RenderToCubeMap              $ARGS --screenshot-frame 42   --screenshot-file screenshots/002_RenderToCubeMap.png             --log-file 002_RenderToCubeMap.txt
            ./build/samples/003_RenderToCubeMapSinglePass    $ARGS --screenshot-frame 83   --screenshot-file screenshots/003_RenderToCubeMapSinglePass.png   --log-file 003_RenderToCubeMapSinglePass.txt
            ./build/samples/004_YUV                          $ARGS --screenshot-frame 1    --screenshot-file screenshots/004_YUV.png                         --log-file 004_YUV.txt
            ./build/samples/005_MeshShaders                  $ARGS --screenshot-frame 1    --screenshot-file screenshots/005_MeshShaders.png                 --log-file 005_MeshShaders.txt
            ./build/samples/007_DynamicRenderingLocalRead    $ARGS --screenshot-frame 30   --screenshot-file screenshots/007_DynamicRenderingLocalRead.png   --log-file 007_DynamicRenderingLocalRead.txt
            ./build/samples/008_MeshShaderFireworks          $ARGS --screenshot-frame 312  --screenshot-file screenshots/008_MeshShaderFireworks.png         --log-file 008_MeshShaderFireworks.txt
            # 009_TriplanarMapping: requires Bistro textures from deploy_content.py
            #./build/samples/009_TriplanarMapping             $ARGS --screenshot-frame 1    --screenshot-file screenshots/009_TriplanarMapping.png            --log-file 009_TriplanarMapping.txt
            ./build/samples/010_OmniShadows                  $ARGS --screenshot-frame 42   --screenshot-file screenshots/010_OmniShadows.png                 --log-file 010_OmniShadows.txt
            ./build/samples/RTX_001_Hello                    $ARGS --screenshot-frame 83   --screenshot-file screenshots/RTX_001_Hello.png                   --log-file RTX_001_Hello.txt

        - name: Compare screenshots
          run: |
            python3 third-party/deps/src/screenshot_tests/scripts/compare_screenshots.py screenshots third-party/deps/src/screenshot_tests/references --threshold 1.0 --diff-dir diffs

        - name: Upload artifacts
          if: always()
          uses: actions/upload-artifact@v6
          with:
            name: LogsAndScreenshots
            path: |
              screenshots/
              diffs/
              *.txt
            if-no-files-found: warn
            retention-days: 3
            overwrite: true
